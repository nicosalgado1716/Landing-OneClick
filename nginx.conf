server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # HTML: siempre revalidar para que los cambios se vean tras cada deploy
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Assets estáticos: caché corta y revalidación (sin 'immutable')
    location ~* \.(?:css|js|svg|jpg|jpeg|png|webp|gif|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=600, must-revalidate";
        try_files $uri =404;
    }

    # Cabeceras de seguridad básicas
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
